<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sayfa Bulunamadı</title>
  <link rel="icon" type="image/png" href="/pngs/sitelogo.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0a0f1e;color:#fff;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
    .bg-blob{position:fixed;border-radius:50%;filter:blur(90px);opacity:.25;pointer-events:none;animation:blobmove 14s ease-in-out infinite alternate;}
    .b1{width:500px;height:500px;background:radial-gradient(circle,#1e40af,transparent 70%);top:-10%;left:-10%;animation-delay:0s;}
    .b2{width:400px;height:400px;background:radial-gradient(circle,#1d4ed8,transparent 70%);bottom:-10%;right:-10%;animation-delay:-5s;}
    @keyframes blobmove{0%{transform:scale(1) translate(0,0);}100%{transform:scale(1.12) translate(15px,-15px);}}
    .box{position:relative;z-index:1;text-align:center;padding:40px 24px;}
    .code{font-size:clamp(5rem,20vw,9rem);font-weight:900;letter-spacing:-4px;line-height:1;background:linear-gradient(135deg,#3b82f6,#1d4ed8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    h1{font-size:clamp(1.1rem,3vw,1.5rem);font-weight:700;margin:12px 0 8px;color:#fff;}
    p{font-size:.9rem;color:rgba(255,255,255,.4);margin-bottom:28px;}
    .home-btn{display:inline-flex;align-items:center;gap:7px;background:#2563eb;color:#fff;text-decoration:none;border-radius:10px;padding:11px 24px;font-size:.88rem;font-weight:700;font-family:'Inter',sans-serif;transition:background .15s,transform .1s;}
    .home-btn:hover{background:#1d4ed8;transform:translateY(-2px);}
  </style>
</head>
<body>
  <div class="bg-blob b1"></div>
  <div class="bg-blob b2"></div>
  <div class="box">
    <div class="code">404</div>
    <h1>Sayfa Bulunamadı</h1>
    <p>Aradığınız sayfa mevcut değil veya taşınmış olabilir.</p>
    <a href="/" class="home-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Ana Sayfaya Dön
    </a>
  </div>
</body>
</html>
